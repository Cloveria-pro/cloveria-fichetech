services:
  - type: web
    name: cloveria-fichetech-api
    env: node
    buildCommand: npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
